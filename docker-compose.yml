services:
  game-asset-studio:
    build: .
    container_name: game-asset-studio
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      VTS_DATA_DIR: /app/data
      VTS_MAX_UPLOAD_MB: 200
      VTS_MAX_DURATION_SECONDS: 60
      VTS_MAX_FRAMES: 120
      VTS_MAX_WIDTH: 1920
      VTS_MAX_HEIGHT: 1080
      VTS_WORKERS: 1
    volumes:
      - ./data:/app/data
